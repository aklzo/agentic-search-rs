name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast feedback on Linux: engine + CLI (no gpui, so no GUI system deps).
  core-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -p agentic-search-core -p agentic-search-cli --all-targets -- -D warnings
      - run: cargo test -p agentic-search-core -p agentic-search-cli

  # Full workspace including the gpui GUI on macOS.
  # gpui builds with the runtime_shaders feature, so no full Xcode is needed.
  workspace-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
